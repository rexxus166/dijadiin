name: Auto Deploy to Kubernetes

on:
  push:
    branches:
      - main # Akan auto deploy setiap ada komit (push) ke branch main

env:
  # Ganti ghcr.io/<usernamemu> sesuai dengan akun GitHub/Dockerhub-mu.
  # Misalnya pakai Dockerhub: username/dijadiin
  # Jika pakai Github Container Registry (GHCR): ghcr.io/${{ github.repository }}
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # Langkah login ke Registry. 
    # Jika menggunakan Dockerhub, ganti registry ke 'docker.io'
    # Pastikan kamu buat secret DOCKER_USERNAME dan DOCKER_PASSWORD di settings repo kamu,
    # atau ubah ke Github Token (GHCR) seperti di bawah ini.
    - name: Log in to the Container registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ env.IMAGE_NAME }}:latest

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    # Terapkan perubahan dan ganti image placeholder pakai image yang barusan di build
    - name: Deploy to Kubernetes
      run: |
        sed -i 's|<username-dockerhub>/dijadiin:latest|${{ env.IMAGE_NAME }}:latest|g' server/deployment.yaml
        # Mengganti rollout restart dengan mengupdate anotasi pada template spec pod
        sed -i "s|app: dijadiin-app|app: dijadiin-app\n        force-restart: \"$(date +%s)\"|g" server/deployment.yaml
        kubectl --kubeconfig=server/kubeconfig.yaml apply -f server/deployment.yaml
