name: Auto Deploy to Kubernetes

on:
  push:
    branches:
      - main # Akan auto deploy setiap ada komit (push) ke branch main

env:
  # Ganti ghcr.io/<usernamemu> sesuai dengan akun GitHub/Dockerhub-mu.
  # Misalnya pakai Dockerhub: username/dijadiin
  # Jika pakai Github Container Registry (GHCR): ghcr.io/${{ github.repository }}
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # Langkah login ke Registry. 
    # Jika menggunakan Dockerhub, ganti registry ke 'docker.io'
    # Pastikan kamu buat secret DOCKER_USERNAME dan DOCKER_PASSWORD di settings repo kamu,
    # atau ubah ke Github Token (GHCR) seperti di bawah ini.
    - name: Log in to the Container registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # Build dengan DUA tag sekaligus: :latest dan :<git-sha>
    # Tag SHA memastikan setiap deploy punya image unik → Kubernetes otomatis restart pod
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ env.IMAGE_NAME }}:latest
          ${{ env.IMAGE_NAME }}:${{ github.sha }}

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    # Delete dulu semua resource lama, lalu buat ulang
    - name: Deploy to Kubernetes
      run: |
        SHA_IMAGE="${{ env.IMAGE_NAME }}:${{ github.sha }}"
        sed -i "s|<username-dockerhub>/dijadiin:latest|${SHA_IMAGE}|g" server/deployment.yaml
        # Hapus resource sample dari panitia yang konflik dengan ingress kita
        kubectl --kubeconfig=server/kubeconfig.yaml delete deployment test-web -n poliwindra --ignore-not-found
        kubectl --kubeconfig=server/kubeconfig.yaml delete service test-web-service -n poliwindra --ignore-not-found
        kubectl --kubeconfig=server/kubeconfig.yaml delete ingress test-web-ingress -n poliwindra --ignore-not-found
        # Hapus resource dijadiin lama
        kubectl --kubeconfig=server/kubeconfig.yaml delete deployment dijadiin-app -n poliwindra --ignore-not-found
        kubectl --kubeconfig=server/kubeconfig.yaml delete service dijadiin-service -n poliwindra --ignore-not-found
        kubectl --kubeconfig=server/kubeconfig.yaml delete ingress dijadiin-ingress -n poliwindra --ignore-not-found
        # Buat ulang semua dari file
        kubectl --kubeconfig=server/kubeconfig.yaml create -f server/deployment.yaml
